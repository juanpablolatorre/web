<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto Nutricional | Univ. del Quindío</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; background: #0f172a; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #gameContainer { width: 90%; max-width: 380px; height: 88vh; background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; padding: 15px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5); border: 6px solid #334155; position: relative; }
        canvas { background: #f8fafc; border-radius: 12px; width: 100%; height: 60%; touch-action: none; transition: background 0.2s; }
        .controls { margin-top: 15px; display: flex; gap: 8px; width: 100%; }
        button { flex: 1; padding: 12px; font-weight: 700; cursor: pointer; border-radius: 10px; border: none; background: #1e293b; color: white; transition: 0.2s; font-size: 0.9rem; }
        #hud { margin-bottom: 5px; font-size: 1.2rem; font-weight: 800; color: #1e293b; text-align: center; }
        #record { font-size: 1rem; color: #64748b; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="gameContainer">
        <center><h3>Balance Food</h3></center>
        <div id="hud">❤️ <span id="vidas">2</span> | 🎯 <span id="puntos">0</span></div>
        <div id="record">🏆 Record: <span id="maxPuntos">0</span></div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls">
            <button onclick="iniciarJuego()">INICIAR</button>
            <button onclick="pausarJuego()">PAUSA</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        let maxPuntos = localStorage.getItem('maxPuntos') || 0;
        document.getElementById("maxPuntos").innerText = maxPuntos;

        function resize() { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
        window.addEventListener('resize', resize);
        resize();

        const healthyFoods = ["🍎", "🥦", "🥕", "🍇", "🍌", "🥑"];
        const junkFoods = ["🍔", "🍕", "🍟", "🍩", "🍦", "🍭"];
        const powerUp = "🏥";

        let vidas = 2, puntos = 0, mouseX = 0, items = [];
        let juegoActivo = false, juegoEnPausa = false;
        let gameSpeed = 0.005; 
        let flashColor = "#f8fafc", mensaje = "";

        const moveHandler = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            mouseX = ((clientX - rect.left) / rect.width) * canvas.width;
        };
        canvas.addEventListener("mousemove", moveHandler);
        canvas.addEventListener("touchmove", moveHandler);

        function iniciarJuego() {
            vidas = 2; puntos = 0; items = []; juegoActivo = true;
            gameSpeed = 0.005; 
            document.getElementById("vidas").innerText = vidas;
            document.getElementById("puntos").innerText = puntos;
            spawnItem(); update();
        }

        function pausarJuego() { juegoEnPausa = !juegoEnPausa; }

        function spawnItem() {
            if (!juegoActivo) return;
            let rand = Math.random();
            let itemData;

            if (rand < 0.1) { itemData = { emoji: powerUp, type: 'heal' }; }
            else if (rand < 0.6) { itemData = { emoji: healthyFoods[Math.floor(Math.random()*healthyFoods.length)], type: 'food' }; }
            else { itemData = { emoji: junkFoods[Math.floor(Math.random()*junkFoods.length)], type: 'junk' }; }

            items.push({ x: Math.random() * (canvas.width - 30), y: -30, ...itemData });
            setTimeout(spawnItem, Math.max(500, 1400 - (puntos * 2)));
        }

        function update() {
            if (!juegoActivo) return;
            if (juegoEnPausa) { requestAnimationFrame(update); return; }

            gameSpeed = 0.005 + (puntos / 20000);
            canvas.style.backgroundColor = flashColor;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (mensaje) {
                ctx.fillStyle = mensaje.includes("CUIDADO") ? "#b91c1c" : "#15803d";
                ctx.font = "bold 16px Arial"; // Texto más pequeño
                ctx.textAlign = "center";
                ctx.fillText(mensaje, canvas.width / 2, canvas.height / 2);
            }

            // --- TAMAÑOS AJUSTADOS ---
            // Personaje más pequeño: 7% del ancho
            ctx.font = (canvas.width * 0.07) + "px Arial";
            ctx.textAlign = "center";
            ctx.fillText("👤", mouseX, canvas.height * 0.9);

            items.forEach((item, index) => {
                item.y += canvas.height * gameSpeed;
                
                // Comida y botiquines más pequeños: 6% del ancho
                ctx.font = (canvas.width * 0.06) + "px Arial";
                ctx.fillText(item.emoji, item.x, item.y);

                // Detección de colisión más estrecha (ajustada a los nuevos tamaños)
                if (item.y > canvas.height * 0.8 && item.y < canvas.height * 0.98 && Math.abs(item.x - mouseX) < canvas.width * 0.08) {
                    if (item.type === 'heal') {
                        vidas = Math.min(vidas + 1, 3);
                        flashColor = "#dcfce7"; mensaje = "¡VIDA RECUPERADA!";
                        setTimeout(() => { flashColor = "#f8fafc"; mensaje = ""; }, 500);
                    } else if (item.type === 'food') {
                        puntos += 10;
                    } else {
                        vidas--;
                        flashColor = "#fecaca"; mensaje = "¡CUIDADO! COMIDA MALA";
                        setTimeout(() => { flashColor = "#f8fafc"; mensaje = ""; }, 500);
                    }
                    items.splice(index, 1);
                    document.getElementById("vidas").innerText = vidas;
                    document.getElementById("puntos").innerText = puntos;
                    
                    if (vidas <= 0) {
                        if (puntos > maxPuntos) {
                            maxPuntos = puntos;
                            localStorage.setItem('maxPuntos', maxPuntos);
                            document.getElementById("maxPuntos").innerText = maxPuntos;
                            alert("¡NUEVO RECORD! Puntos: " + puntos);
                        } else {
                            alert("¡Perdiste! Puntos: " + puntos);
                        }
                        juegoActivo = false;
                    }
                }
                if (item.y > canvas.height) items.splice(index, 1);
            });
            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
